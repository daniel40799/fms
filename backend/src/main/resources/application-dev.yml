spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: ${JPA_SHOW_SQL:false}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.fapor7.fms: ${LOGGING_LEVEL_APP:INFO}
    org.hibernate.SQL: ${LOGGING_LEVEL_SQL:INFO}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  upload:
    base-path: ${APP_UPLOAD_BASE_PATH:uploads}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  two-factor:
    email:
      enabled: ${APP_2FA_EMAIL_ENABLED:false}
      log-codes: ${APP_2FA_EMAIL_LOG_CODES:false}
  sms:
    semaphore:
      enabled: ${APP_2FA_SMS_ENABLED:false}
  sso:
    frontend-success-uri: ${SSO_FRONTEND_SUCCESS_URI:}
  dev-seed:
    enabled: ${APP_DEV_SEED_ENABLED:false}
    password: ${APP_DEV_SEED_PASSWORD:}
