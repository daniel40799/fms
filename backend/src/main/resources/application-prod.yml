spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.fapor7.fms: ${LOGGING_LEVEL_APP:INFO}
    org.hibernate.SQL: INFO

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  upload:
    base-path: ${APP_UPLOAD_BASE_PATH:uploads}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  two-factor:
    email:
      enabled: ${APP_2FA_EMAIL_ENABLED:false}
      log-codes: false
  sms:
    semaphore:
      enabled: ${APP_2FA_SMS_ENABLED:false}
  sso:
    frontend-success-uri: ${SSO_FRONTEND_SUCCESS_URI:}
