spring:
  application:
    name: fms

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  upload:
    base-path: ${APP_UPLOAD_BASE_PATH:uploads}
  storage:
    type: ${APP_STORAGE_TYPE:local}
    local:
      base-path: ${APP_UPLOAD_BASE_PATH:uploads}
    azure:
      connection-string: ${AZURE_STORAGE_CONNECTION_STRING:}
      account-name: ${AZURE_STORAGE_ACCOUNT_NAME:}
      account-key: ${AZURE_STORAGE_ACCOUNT_KEY:}
      containers:
        payment-proofs: ${AZURE_STORAGE_CONTAINER_PAYMENT_PROOFS:}
        profile-pictures: ${AZURE_STORAGE_CONTAINER_PROFILE_PICTURES:}
        event-resources: ${AZURE_STORAGE_CONTAINER_EVENT_RESOURCES:}
        certificates: ${AZURE_STORAGE_CONTAINER_CERTIFICATES:}
  payment-proof:
    max-size-bytes: ${APP_PAYMENT_PROOF_MAX_SIZE_BYTES:10485760}
    allowed-content-types: ${APP_PAYMENT_PROOF_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,application/pdf}
    allowed-extensions: ${APP_PAYMENT_PROOF_ALLOWED_EXTENSIONS:jpg,jpeg,png,pdf}
  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  two-factor:
    email:
      enabled: ${APP_2FA_EMAIL_ENABLED:false}
      log-codes: false
      acs:
        enabled: ${ACS_EMAIL_ENABLED:false}
        connection-string: ${ACS_EMAIL_CONNECTION_STRING:}
        sender-address: ${ACS_EMAIL_SENDER_ADDRESS:}
        subject: ${ACS_EMAIL_SUBJECT:Fapor7 verification code}
    code-length: ${APP_2FA_CODE_LENGTH:6}
    expiry-minutes: ${APP_2FA_EXPIRY_MINUTES:10}
    resend-cooldown-seconds: ${APP_2FA_RESEND_COOLDOWN_SECONDS:60}
    max-failed-attempts: ${APP_2FA_MAX_FAILED_ATTEMPTS:5}
    max-challenges-per-hour: ${APP_2FA_MAX_CHALLENGES_PER_HOUR:5}
  sms:
    semaphore:
      enabled: ${APP_2FA_SMS_ENABLED:false}
      api-key: ${SEMAPHORE_API_KEY:}
      sender-name: ${SEMAPHORE_SENDER_NAME:}
      base-url: ${SEMAPHORE_BASE_URL:https://api.semaphore.co/api/v4/messages}
  sso:
    enabled: ${APP_SSO_ENABLED:false}
    frontend-success-uri: ${SSO_FRONTEND_SUCCESS_URI:}
  dev-seed:
    enabled: false
    password: ${APP_DEV_SEED_PASSWORD:}
  initial-admin:
    email: ${INITIAL_ADMIN_EMAIL:}
    password: ${INITIAL_ADMIN_PASSWORD:}
    full-name: ${INITIAL_ADMIN_FULL_NAME:}
