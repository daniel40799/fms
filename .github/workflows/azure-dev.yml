name: Azure Dev Deploy

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: azure-dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  guard:
    name: Validate Dev Deployment Branch
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require develop branch
        if: github.ref != 'refs/heads/develop'
        run: |
          echo "Dev deployments must run from develop. Current ref: ${{ github.ref }}"
          exit 1

      - name: Branch validated
        run: echo "Dev deployment branch validated."

  backend:
    name: Build, Test, and Deploy Backend to Dev
    needs: guard
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        working-directory: backend
        run: chmod +x mvnw

      - name: Test backend
        working-directory: backend
        run: ./mvnw -B test

      - name: Package backend
        working-directory: backend
        run: ./mvnw -B package -DskipTests

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_DEV }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_DEV }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_DEV }}
          package: backend/target/*.jar

  frontend:
    name: Build and Deploy Frontend to Dev
    needs: guard
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DEV }}
          action: upload
          app_location: ./frontend/dist
          api_location: ""
          output_location: ""
          skip_app_build: true
