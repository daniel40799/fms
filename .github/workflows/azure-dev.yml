name: Azure Dev Deploy

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: azure-dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-dev-branch:
    name: Validate Dev Branch
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require develop branch
        if: github.ref != 'refs/heads/develop'
        run: |
          echo "Dev deployments must run from develop. Current ref: ${{ github.ref }}"
          exit 1

      - name: Branch validated
        run: echo "Dev deployment branch validated."

  backend-test:
    name: Backend Test
    needs: validate-dev-branch
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        working-directory: backend
        run: chmod +x mvnw

      - name: Test backend
        working-directory: backend
        run: ./mvnw -B test

  backend-package:
    name: Backend Package
    needs: validate-dev-branch
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        working-directory: backend
        run: chmod +x mvnw

      - name: Package backend
        working-directory: backend
        run: ./mvnw -B package -DskipTests

      - name: Upload backend package
        uses: actions/upload-artifact@v4
        with:
          name: backend-package
          path: backend/target/*.jar
          if-no-files-found: error
          retention-days: 1

  backend-deploy-dev:
    name: Backend Deploy Dev
    needs:
      - validate-dev-branch
      - backend-test
      - backend-package
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download backend package
        uses: actions/download-artifact@v4
        with:
          name: backend-package
          path: backend-package

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_DEV }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_DEV }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_DEV }}
          package: backend-package/*.jar

  frontend-install-build:
    name: Frontend Install and Build
    needs: validate-dev-branch
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate frontend API base URL
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL_DEV }}
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "Set the dev GitHub Environment variable VITE_API_BASE_URL_DEV to the backend App Service origin."
            exit 1
          fi

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL_DEV }}
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 1

  frontend-deploy-dev:
    name: Frontend Deploy Dev
    needs:
      - validate-dev-branch
      - frontend-install-build
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
    steps:
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Deploy frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DEV }}
          action: upload
          app_location: ./frontend-dist
          api_location: ""
          output_location: ""
          skip_app_build: true
