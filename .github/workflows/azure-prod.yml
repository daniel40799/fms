name: Azure Prod Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: azure-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: Validate Prod Deployment Branch
    runs-on: ubuntu-latest
    steps:
      - name: Require main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Prod deployments must run from main. Current ref: ${{ github.ref }}"
          exit 1

      - name: Branch validated
        run: echo "Prod deployment branch validated."

  backend:
    name: Build, Test, and Deploy Backend to Prod
    needs: guard
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        working-directory: backend
        run: chmod +x mvnw

      - name: Test backend
        working-directory: backend
        run: ./mvnw -B test

      - name: Package backend
        working-directory: backend
        run: ./mvnw -B package -DskipTests

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_PROD }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROD }}
          package: backend/target/*.jar
        # OIDC alternative: replace publish-profile with azure/login using explicit prod OIDC secrets.

  frontend:
    name: Build and Deploy Frontend to Prod
    needs: guard
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
          action: upload
          app_location: ./frontend/dist
          api_location: ""
          output_location: ""
          skip_app_build: true
